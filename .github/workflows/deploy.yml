name: Deploy To AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Deploy on EC2
        shell: bash
        env:
          APP_DOMAIN: ${{ vars.APP_DOMAIN }}
        run: |
          set -euo pipefail

          DOMAIN="${APP_DOMAIN:-}"
          if [ -z "$DOMAIN" ]; then
            DOMAIN="51.20.5.125"
          fi

          APP_DIR="/var/www/laptop-store" \
          DATA_DIR="/var/www/oj-devices-data" \
          SOURCE_DIR="$GITHUB_WORKSPACE" \
          DOMAIN="$DOMAIN" \
          PORT="5000" \
          NODE_VERSION="20" \
          bash "$GITHUB_WORKSPACE/ops/github-deploy.sh"
